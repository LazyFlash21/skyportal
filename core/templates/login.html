<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Sky Portal</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-wrapper">

    <div class="auth-box">
        
        <div class="auth-logo">
            <img src="{% static 'images/Sky_Group_logo_2020.png' %}" alt="Sky Logo">
            <h2>Welcome back</h2>
            <p>Sign in to Sky Engineering Portal</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username">
            </div>
            <div class="form-group" style="margin-bottom:24px;">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password">
            </div>

            {% if form.errors %}
                <p class="error-msg">Invalid username or password.</p>
            {% endif %}

            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <p class="auth-footer">
            Don't have an account? <a href="{% url 'register' %}">Register here</a>
        </p>
        <p class="auth-footer">
            <a href="{% url 'forgot_password' %}">Forgot your password?</a>
        </p>

    </div>

</body>
</html>
