<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Sky Portal</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-wrapper">

    <div class="auth-box">

        <div class="auth-logo">
            <img src="{% static 'images/Sky_Group_logo_2020.png' %}" alt="Sky Logo">
            <h2>Create Account</h2>
            <p>Join Sky Engineering Portal</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password1" placeholder="Choose a password">
            </div>
            <div class="form-group" style="margin-bottom:24px;">
                <label>Confirm Password</label>
                <input type="password" name="password2" placeholder="Confirm your password">
            </div>

            {% if form.errors %}
                <div class="error-msg">{{ form.errors }}</div>
            {% endif %}

            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>

        <p class="auth-footer">
            Already have an account? <a href="{% url 'login' %}">Sign in here</a>
        </p>

    </div>

</body>
</html>
