<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – Sky Portal</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-wrapper">

    <div class="auth-box">

        <div class="auth-logo">
            <img src="{% static 'images/Sky_Group_logo_2020.png' %}" alt="Sky Logo">
            <h2>Reset Password</h2>
            <p>Enter your username and new password</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password1" placeholder="Enter new password">
            </div>
            <div class="form-group" style="margin-bottom:24px;">
                <label>Confirm New Password</label>
                <input type="password" name="new_password2" placeholder="Confirm new password">
            </div>

            {% if error %}
                <p class="error-msg">{{ error }}</p>
            {% endif %}

            <button type="submit" class="btn btn-primary btn-full">Reset Password</button>
        </form>

        <p class="auth-footer">
            Remember your password? <a href="{% url 'login' %}">Sign in here</a>
        </p>

    </div>

</body>
</html>
