{% extends 'base.html' %}

{% block title %}Change Password – Sky Portal{% endblock %}

{% block page_title %}Change Password{% endblock %}

{% block content %}

<div style="max-width:500px; margin:0 auto;">
    <div class="card">
        <h3 style="margin-bottom:20px;">Change Password</h3>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="old_password" placeholder="Enter current password">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password1" placeholder="Enter new password">
            </div>
            <div class="form-group" style="margin-bottom:24px;">
                <label>Confirm New Password</label>
                <input type="password" name="new_password2" placeholder="Confirm new password">
            </div>

            {% if form.errors %}
                <div class="error-msg">{{ form.errors }}</div>
            {% endif %}

            <button type="submit" class="btn btn-primary btn-full">Update Password</button>
        </form>

        <div style="text-align:center; margin-top:16px;">
            <a href="{% url 'profile' %}" style="color:var(--sky-blue-btn); font-size:0.9rem;">← Back to Profile</a>
        </div>
    </div>
</div>

{% endblock %}
